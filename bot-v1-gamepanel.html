<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>라니봇 v1 | 게임 패널</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family:
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "Apple Color Emoji",
        "Segoe UI Emoji",
        "Noto Color Emoji",
        sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 55%),
        radial-gradient(circle at bottom right, rgba(236,72,153,0.15), transparent 55%),
        #020617;
      color: #e5e7eb;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 16px 80px;
    }
    header {
      margin-bottom: 28px;
      border-bottom: 1px solid rgba(148,163,184,0.3);
      padding-bottom: 18px;
    }
    header .path {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 6px;
    }
    header h1 {
      font-size: 28px;
      margin: 0 0 8px;
      text-shadow: 0 0 14px rgba(59,130,246,0.35);
    }
    header .meta {
      font-size: 14px;
      color: #9ca3af;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }
    header code {
      background: #020617;
      border-radius: 4px;
      padding: 2px 6px;
      border: 1px solid rgba(75,85,99,0.8);
      font-size: 12px;
    }
    .tag {
      font-size: 13px;
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(148,163,184,0.6);
      color: #9ca3af;
    }
    h2 {
      font-size: 22px;
      margin-top: 32px;
      border-bottom: 1px solid rgba(55,65,81,0.7);
      padding-bottom: 4px;
    }
    h3 {
      font-size: 18px;
      margin-top: 20px;
    }
    p {
      font-size: 16px;
      line-height: 1.8;
      color: #d1d5db;
    }
    ul {
      font-size: 16px;
      line-height: 1.8;
      color: #d1d5db;
      padding-left: 18px;
    }
    li + li {
      margin-top: 4px;
    }
    code {
      font-family: "JetBrains Mono", "Fira Code", monospace;
      font-size: 13px;
      background: #020617;
      padding: 1px 5px;
      border-radius: 4px;
      border: 1px solid rgba(55,65,81,0.8);
    }
    .note {
      margin: 16px 0;
      padding: 10px 12px;
      border-radius: 6px;
      background: rgba(30,64,175,0.15);
      border-left: 3px solid #60a5fa;
      font-size: 13px;
      color: #bfdbfe;
    }
    .block {
      background: #020617;
      border-radius: 8px;
      padding: 12px 14px;
      border: 1px solid rgba(55,65,81,0.9);
      font-size: 14px;
      margin: 10px 0;
      white-space: pre-line;
    }
    a {
      color: #60a5fa;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="path">라니봇 v1 &gt; RLNL 게임 &gt; /gamepanel</div>
      <h1>/gamepanel · RLNL 게임 패널</h1>
      <div class="meta">
        <code>/gamepanel</code>
        <span class="tag">유저용 게임 패널</span>
        <span class="tag">바카라 · 출석 · 위로금 · 리필</span>
      </div>
    </header>

    <section>
      <p>
        <strong>/gamepanel</strong> 명령어는 서버 유저들이 RLNL 게임을 이용할 수 있는 패널을 띄우는 기능입니다.
        설정에 따라 바카라, 출석, 일일 위로금, 30분 리필 버튼이 함께 표시됩니다.
      </p>
      <div class="note">
        👉 이 기능은 <code>/setup</code>에서 <code>enable_game: true</code>로 설정된 서버에서만 동작합니다.
      </div>
    </section>

    <!-- 나중에 상세 내용 채워 넣기 -->
  </div>
</body>
</html>
