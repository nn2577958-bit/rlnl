<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>포인트 충전 (테스트)</title>
</head>
<body>
  디스코드 ID:
  <input id="discordId" placeholder="예: 713675224356487220"><br><br>

  금액:
  <input id="amount" type="number" value="1000"><br><br>

  <button onclick="pay()">결제하기 (테스트)</button>

  <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
  <script>
    async function pay() {
      const discordId = document.getElementById("discordId").value.trim();
      const amount = Number(document.getElementById("amount").value || "0");

      if (!discordId) {
        alert("디스코드 ID를 입력해 주세요.");
        return;
      }
      if (!amount || amount <= 0) {
        alert("금액을 올바르게 입력해 주세요.");
        return;
      }

      try {
        const response = await PortOne.requestPayment({
          // 네가 준 값들로 세팅
          storeId: "iamporttest_3",
          channelKey: "channel-key-abc196b1-4a38-4fcd-9f48-ba2e5df74326",
          isTestChannel: true,

          paymentId: "order-" + Date.now(),
          orderName: "포인트 충전 (테스트)",
          totalAmount: amount,
          currency: "KRW",
          payMethod: "CARD",

          customData: {
            discord_id: discordId
          },

          // 테스트용 완료 페이지 (원하면 나중에 네 도메인으로 변경)
          redirectUrl: "https://example.com/charge-complete.html"
        });

        console.log("결제 응답:", response);
      } catch (e) {
        console.error("결제 에러:", e);
        alert("에러: " + (e?.message || e));
      }
    }
  </script>
</body>
</html>
