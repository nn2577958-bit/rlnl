<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>포인트 충전 테스트</title>
</head>
<body>
  디스코드 ID:
  <input id="discordId" placeholder="예: 713675224356487220"><br><br>

  <button onclick="pay()">결제 테스트</button>

  <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
  <script>
    async function pay() {
      const discordId = document.getElementById("discordId").value;
      if (!discordId) {
        alert("713675224356487220");
        return;
      }

      try {
        const response = await PortOne.requestPayment({
          storeId: "store-16f9ad0b-fe2e-4c30-89d9-65943e891642",
          channelKey: "channel-key-72dd528f-1c37-407b-b5a7-40faa63f46ce",  // KG 채널키
          paymentId: "order-" + Date.now(),
          orderName: "포인트 충전",
          totalAmount: 1000,
          currency: "KRW",
          payMethod: "CARD",   // 카드 결제
          customData: {
            discord_id: discordId
          }
        });
        console.log(response);
      } catch (e) {
        console.error(e);
        alert("에러: " + e);
      }
    }
  </script>
</body>
</html>
