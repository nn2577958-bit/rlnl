<script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
<script>
  async function pay() {
    const discordId = document.getElementById("discordId").value;
    if (!discordId) {
      alert("713675224356487220");
      return;
    }

    try {
      const response = await PortOne.requestPayment({
        storeId: "store-16f9ad0b-fe2e-4c30-89d9-65943e891642",
        channelKey: "channel-key-72dd528f-1c37-407b-b5a7-40faa63f46ce",  // 여기에만 네 채널키
        paymentId: "test-" + Date.now(),
        orderName: "포인트 충전 테스트",
        totalAmount: 1000,
        currency: "KRW",
        customData: {
          discord_id: discordId
        }
      });
      console.log(response);
    } catch (e) {
      console.error(e);
      alert("에러: " + e);
    }
  }
</script>
