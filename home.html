<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>라니 디지털 - 홈</title>

<link rel="icon" type="image/png"
      href="https://cdn.phototourl.com/uploads/2026-02-28-90909391-9783-4299-a370-a3766a19e150.png">
  
<style>
* {box-sizing:border-box;margin:0;padding:0}
body {
  min-height:100vh;
  font-family:'Segoe UI',sans-serif;
  background:
    radial-gradient(circle at top, rgba(15,23,42,.7), rgba(15,23,42,.95)),
    url('https://cdn.phototourl.com/uploads/2026-02-18-2239f19c-5c7f-4c1e-b1c1-731bf5606151.webp') center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:#fff;
  gap:20px;
}

/* 메인 카드 컨테이너 */
.container {
  width:92vw;
  max-width:960px;
  padding:24px 24px 22px;
  background:rgba(15,23,42,.82);
  backdrop-filter:blur(12px);
  border-radius:22px;
  border:1px solid rgba(148,163,184,.35);
  box-shadow:0 22px 50px rgba(15,23,42,.9);
  display:flex;
  flex-direction:column;
  gap:18px;
}

/* 상단 상태 + 헤더 라인 */
.top-row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}
#status {
  font-size:12px;
  font-weight:600;
  padding:6px 12px;
  background:rgba(34,197,94,.15);
  border-radius:999px;
  border:1px solid rgba(34,197,94,.3);
}
.header-info {text-align:right}
.mall-name {font-size:18px;font-weight:800;letter-spacing:.03em}
.mall-sub {font-size:12px;color:rgba(209,213,219,.9)}

/* 환영 문구 */
#welcome {
  font-size:20px;
  font-weight:700;
  background:linear-gradient(135deg,#e5e7eb,#f9fafb);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-align:left;
}

/* 안내 박스 */
.notice {
  margin:4px 0 8px;
  padding:8px 10px;
  border-radius:10px;
  border:1px solid rgba(148,163,184,.7);
  font-size:11px;
  line-height:1.5;
  color:#e5e7eb;
  background:rgba(15,23,42,.85);
}
.notice b {
  color:#fbbf24;
}

/* 카테고리 탭 */
.tabs {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:-4px;
}
.tab {
  padding:6px 12px;
  border-radius:999px;
  border:1px solid rgba(148,163,184,.5);
  font-size:11px;
  color:rgba(209,213,219,.9);
  cursor:pointer;
  background:rgba(15,23,42,.85);
  transition:all .2s;
}
.tab.active {
  background:linear-gradient(135deg,#3b82f6,#22c55e);
  border-color:transparent;
  color:#f9fafb;
  box-shadow:0 6px 14px rgba(37,99,235,.55);
}

/* === 섹션 공통 스타일 === */
.section {
  margin-top:10px;
  padding-top:12px;
  border-top:1px solid rgba(148,163,184,.35);
}
.section h2 {
  font-size:16px;
  margin-bottom:4px;
}
.section-sub {
  font-size:12px;
  color:#cbd5f5;
  margin-bottom:10px;
}

/* 대표 서비스 요약 카드 */
.simple-grid {
  display:grid;
  gap:8px;
}
@media (min-width:768px) {
  .simple-grid {
    grid-template-columns: repeat(3, minmax(0,1fr));
  }
}
.simple-card {
  background:rgba(15,23,42,.9);
  border-radius:12px;
  border:1px solid rgba(148,163,184,.4);
  padding:9px 9px;
  font-size:12px;
}
.simple-card h3 {
  font-size:13px;
  margin-bottom:4px;
}
.simple-card p {
  font-size:12px;
  color:#e5e7eb;
}

/* 후기 */
.review-grid {
  display:grid;
  gap:8px;
}
@media (min-width:768px) {
  .review-grid {
    grid-template-columns: repeat(3, minmax(0,1fr));
  }
}
.review {
  font-size:12px;
  background:rgba(15,23,42,.9);
  border-radius:12px;
  border:1px solid rgba(148,163,184,.4);
  padding:8px 9px;
}
.review blockquote {
  margin-bottom:4px;
  color:#e5e7eb;
}
.review figcaption {
  color:#94a3b8;
  font-size:11px;
}

/* CTA 버튼 섹션 */
.section-cta {
  text-align:center;
}
.cta-btn {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-top:10px;
  padding:10px 26px;
  border-radius:999px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#fff;
  font-size:14px;
  font-weight:600;
  text-decoration:none;
  box-shadow:0 8px 20px rgba(34,197,94,.45);
}

/* 상품 그리드 - 정렬 깔끔 버전 */
#product-list {
  display:grid;
  justify-content:center;                        /* 가운데 정렬 */
  grid-template-columns:repeat(1, minmax(220px, 260px));
  gap:18px;
  width:100%;
  margin-top:4px;
  padding:4px 0 8px;
  min-height:280px;
}

/* 화면 크기에 따라 2열/3열 */
@media (min-width:768px) {
  #product-list {
    grid-template-columns:repeat(2, minmax(220px, 260px));
  }
}
@media (min-width:1024px) {
  #product-list {
    grid-template-columns:repeat(3, minmax(220px, 260px));
  }
}

/* 상품 카드 + LED 테두리 */
.product {
  width:100%;
  max-width:260px;
  background:radial-gradient(circle at top left, rgba(148,163,184,.18), transparent 55%),
             rgba(15,23,42,.95);
  backdrop-filter:blur(10px);
  border:1px solid rgba(148,163,184,.45);
  padding:18px 16px 14px;
  border-radius:16px;
  transition:all .3s;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
}
.product::before {
  content:'';
  position:absolute;
  inset:-2px;
  border-radius:inherit;
  padding:2px;
  background:
    conic-gradient(
      from 0deg,
      #22c55e,
      #0ea5e9,
      #6366f1,
      #ec4899,
      #22c55e
    );
  mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  mask-composite:exclude;
  -webkit-mask-composite:xor;
  opacity:.7;
  animation:led-border 8s linear infinite;
  pointer-events:none;
}
.product-content {
  position:relative;
  z-index:1;
}
@keyframes led-border {
  to { transform:rotate(360deg); }
}
.product:hover {
  transform:translateY(-6px);
  box-shadow:0 18px 28px rgba(15,23,42,.75);
  border-color:rgba(56,189,248,.7);
}
.product h3 {
  margin:0 0 6px;
  font-size:15px;
  font-weight:700;
  color:#f9fafb;
}
.product p {
  margin:0 0 6px;
  font-size:14px;
  font-weight:600;
  background:linear-gradient(135deg,#4ade80,#22c55e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.product small {
  color:rgba(209,213,219,.88);
  font-size:12px;
  display:block;
  margin-bottom:10px;
}
.product-footer {
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  margin-top:auto;
}
.badge {
  padding:4px 8px;
  border-radius:999px;
  border:1px solid rgba(148,163,184,.6);
  font-size:10px;
  color:rgba(209,213,219,.9);
}

/* 구매하기 버튼 */
.buy-btn {
  padding:6px 12px;
  border-radius:999px;
  border:none;
  cursor:pointer;
  font-size:12px;
  font-weight:600;
  color:#0f172a;
  background:linear-gradient(135deg,#4ade80,#22c55e);
  box-shadow:0 6px 14px rgba(34,197,94,.45);
  transition:transform .15s, box-shadow .15s, background .15s;
}
.buy-btn:hover {
  transform:translateY(-1px);
  box-shadow:0 10px 18px rgba(34,197,94,.55);
}

/* 하단 버튼 줄 */
.btn-row {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  gap:12px;
  margin-top:16px;
}

/* 하단 버튼 스타일 (4개만) */
.logout-btn, .discord-btn, .inquiry-main-btn, .reset-btn {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:10px 22px;
  border:none;
  border-radius:999px;
  cursor:pointer;
  font-weight:600;
  font-size:14px;
  color:#fff;
  transition:all .2s;
  box-shadow:0 4px 15px rgba(15,23,42,.7);
  min-width:160px;
  text-align:center;
}
.logout-btn {background:linear-gradient(135deg,#d32f2f,#b71c1c)}
.logout-btn:hover {background:linear-gradient(135deg,#b71c1c,#7f0000);transform:translateY(-1px)}
.discord-btn {background:linear-gradient(135deg,#5865F2,#404EED)}
.discord-btn:hover {background:linear-gradient(135deg,#404EED,#2833C4);transform:translateY(-1px)}
.inquiry-main-btn {background:linear-gradient(135deg,#22c55e,#16a34a)}
.inquiry-main-btn:hover {background:linear-gradient(135deg,#16a34a,#15803d);transform:translateY(-1px)}
.reset-btn {
  background:linear-gradient(135deg,#0ea5e9,#2563eb);
  display:none; /* 기본은 숨김, 관리자만 노출 */
}
.reset-btn:hover {
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  transform:translateY(-1px);
}

/* 반응형 – 아래는 버튼/컨테이너만 */
@media (max-width:768px) {
  .container{
    padding:20px 18px;
  }
  .btn-row{
    justify-content:center;
  }
}
@media (max-width:480px) {
  .container{
    padding:18px;
    max-width:95vw;
  }
  #welcome{
    font-size:18px;
  }
}
</style>
</head>

</html>
