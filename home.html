<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>라니 디지털 - 홈</title>

<link rel="icon" type="image/png"
      href="https://cdn.phototourl.com/uploads/2026-02-28-90909391-9783-4299-a370-a3766a19e150.png">
  
<style>
* {box-sizing:border-box;margin:0;padding:0}
body {
  min-height:100vh;
  font-family:'Segoe UI',sans-serif;
  background:
    radial-gradient(circle at top, rgba(15,23,42,.7), rgba(15,23,42,.95)),
    url('https://cdn.phototourl.com/uploads/2026-02-18-2239f19c-5c7f-4c1e-b1c1-731bf5606151.webp') center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:#fff;
  gap:20px;
}

/* 메인 카드 컨테이너 */
.container {
  width:92vw;
  max-width:960px;
  padding:24px 24px 22px;
  background:rgba(15,23,42,.82);
  backdrop-filter:blur(12px);
  border-radius:22px;
  border:1px solid rgba(148,163,184,.35);
  box-shadow:0 22px 50px rgba(15,23,42,.9);
  display:flex;
  flex-direction:column;
  gap:18px;
}

/* 상단 상태 + 헤더 라인 */
.top-row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}
#status {
  font-size:12px;
  font-weight:600;
  padding:6px 12px;
  background:rgba(34,197,94,.15);
  border-radius:999px;
  border:1px solid rgba(34,197,94,.3);
}
.header-info {text-align:right}
.mall-name {font-size:18px;font-weight:800;letter-spacing:.03em}
.mall-sub {font-size:12px;color:rgba(209,213,219,.9)}

/* 환영 문구 */
#welcome {
  font-size:20px;
  font-weight:700;
  background:linear-gradient(135deg,#e5e7eb,#f9fafb);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-align:left;
}

/* 안내 박스 */
.notice {
  margin:4px 0 8px;
  padding:8px 10px;
  border-radius:10px;
  border:1px solid rgba(148,163,184,.7);
  font-size:11px;
  line-height:1.5;
  color:#e5e7eb;
  background:rgba(15,23,42,.85);
}
.notice b {
  color:#fbbf24;
}

/* 카테고리 탭 */
.tabs {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:-4px;
}
.tab {
  padding:6px 12px;
  border-radius:999px;
  border:1px solid rgba(148,163,184,.5);
  font-size:11px;
  color:rgba(209,213,219,.9);
  cursor:pointer;
  background:rgba(15,23,42,.85);
  transition:all .2s;
}
.tab.active {
  background:linear-gradient(135deg,#3b82f6,#22c55e);
  border-color:transparent;
  color:#f9fafb;
  box-shadow:0 6px 14px rgba(37,99,235,.55);
}

/* 상품 그리드 */
#product-list {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:18px;
  width:100%;
  margin-top:4px;
}

/* 상품 카드 + LED 테두리 */
.product {
  width:100%;
  max-width:260px;
  background:radial-gradient(circle at top left, rgba(148,163,184,.18), transparent 55%),
             rgba(15,23,42,.95);
  backdrop-filter:blur(10px);
  border:1px solid rgba(148,163,184,.45);
  padding:18px 16px 14px;
  border-radius:16px;
  transition:all .3s;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
}

/* LED 외곽 테두리 */
.product::before {
  content:'';
  position:absolute;
  inset:-2px;
  border-radius:inherit;
  padding:2px;
  background:
    conic-gradient(
      from 0deg,
      #22c55e,
      #0ea5e9,
      #6366f1,
      #ec4899,
      #22c55e
    );
  mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  mask-composite:exclude;
  -webkit-mask-composite:xor;
  opacity:.7;
  animation:led-border 8s linear infinite;
  pointer-events:none;
}

/* 카드 안쪽 내용 영역 (LED 테두리와 겹치지 않게) */
.product-content {
  position:relative;
  z-index:1;
}

/* LED 테두리 회전 애니메이션 */
@keyframes led-border {
  to { transform:rotate(360deg); }
}

.product:hover {
  transform:translateY(-6px);
  box-shadow:0 18px 28px rgba(15,23,42,.75);
  border-color:rgba(56,189,248,.7);
}

.product h3 {
  margin:0 0 6px;
  font-size:15px;
  font-weight:700;
  color:#f9fafb;
}
.product p {
  margin:0 0 6px;
  font-size:14px;
  font-weight:600;
  background:linear-gradient(135deg,#4ade80,#22c55e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.product small {
  color:rgba(209,213,219,.88);
  font-size:12px;
  display:block;
  margin-bottom:10px;
}
.product-footer {
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  margin-top:auto;
}
.badge {
  padding:4px 8px;
  border-radius:999px;
  border:1px solid rgba(148,163,184,.6);
  font-size:10px;
  color:rgba(209,213,219,.9);
}

/* 구매하기 버튼 */
.buy-btn {
  padding:6px 12px;
  border-radius:999px;
  border:none;
  cursor:pointer;
  font-size:12px;
  font-weight:600;
  color:#0f172a;
  background:linear-gradient(135deg,#4ade80,#22c55e);
  box-shadow:0 6px 14px rgba(34,197,94,.45);
  transition:transform .15s, box-shadow .15s, background .15s;
}
.buy-btn:hover {
  transform:translateY(-1px);
  box-shadow:0 10px 18px rgba(34,197,94,.55);
}

/* 하단 버튼 줄 */
.btn-row {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  gap:12px;
  margin-top:16px;
}

/* 하단 버튼 스타일 */
.logout-btn, .discord-btn, .inquiry-main-btn, .reset-btn {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:9px 18px;
  border:none;
  border-radius:999px;
  cursor:pointer;
  font-weight:600;
  font-size:13px;
  color:#fff;
  transition:all .2s;
  box-shadow:0 4px 15px rgba(15,23,42,.7);
  min-width:150px;
  text-align:center;
}
.logout-btn {background:linear-gradient(135deg,#d32f2f,#b71c1c)}
.logout-btn:hover {background:linear-gradient(135deg,#b71c1c,#7f0000);transform:translateY(-1px)}
.discord-btn {background:linear-gradient(135deg,#5865F2,#404EED)}
.discord-btn:hover {background:linear-gradient(135deg,#404EED,#2833C4);transform:translateY(-1px)}
.inquiry-main-btn {background:linear-gradient(135deg,#22c55e,#16a34a)}
.inquiry-main-btn:hover {background:linear-gradient(135deg,#16a34a,#15803d);transform:translateY(-1px)}
.reset-btn {
  background:linear-gradient(135deg,#0ea5e9,#2563eb);
  display:none; /* 기본은 숨김, 관리자만 노출 */
}
.reset-btn:hover {
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  transform:translateY(-1px);
}

/* 반응형 */
@media (min-width:1024px) {
  #product-list{
    grid-template-columns:repeat(3,1fr);
  }
}
@media (max-width:768px) {
  .container{
    padding:20px 18px;
  }
  #product-list{
    grid-template-columns:repeat(2,1fr);
    gap:14px;
  }
  .btn-row{
    justify-content:center;
  }
}
@media (max-width:480px) {
  .container{
    padding:18px;
    max-width:95vw;
  }
  #welcome{
    font-size:18px;
  }
  #product-list{
    grid-template-columns:1fr;
    gap:12px;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="top-row">
    <div id="status">🟢 온라인</div>
    <div class="header-info">
      <div class="mall-name">라니 MALL</div>
      <div class="mall-sub">디스코드 봇 · 서버 세팅 · 로고 디자인</div>
    </div>
  </div>

  <h1 id="welcome">로그인 확인 중...</h1>
  
  <div class="notice">
    <b>안내</b> · 포인트로만 구매 가능한 상품입니다. 디스코드 문의를 통해 배송 정보 등을 전달해 주세요.
  </div>

  <!-- 카테고리 탭 -->
  <div class="tabs">
    <button class="tab active" data-filter="all">전체</button>
    <button class="tab" data-filter="bot">디스코드 봇</button>
    <button class="tab" data-filter="design">디자인</button>
    <button class="tab" data-filter="hosting">호스팅</button>
  </div>

  <div id="product-list"></div>

  <div class="btn-row">
    <button class="logout-btn" id="logout-btn">🚪 로그아웃</button>
    <button class="reset-btn" id="reset-points-btn">🧹 포인트 초기화</button>
    <button class="discord-btn" id="discord-btn">🙈 디스코드</button>
    <button class="inquiry-main-btn" id="inquiry-btn">📨 문의하기</button>
    <button class="inquiry-main-btn" id="faq-btn">❓ FAQ</button>
    <button class="inquiry-main-btn" id="points-btn">💳 포인트 정책</button>
  </div>
</div>


<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const welcomeEl   = document.getElementById("welcome");
const productList = document.getElementById("product-list");
const logoutBtn   = document.getElementById("logout-btn");
const discordBtn  = document.getElementById("discord-btn");
const inquiryBtn  = document.getElementById("inquiry-btn");
const resetBtn    = document.getElementById("reset-points-btn");
const tabs        = document.querySelectorAll(".tab");
const faqBtn      = document.getElementById("faq-btn");
const pointsBtn   = document.getElementById("points-btn");

// 상품 목록 (티켓봇/백업 클론/라이센스 포함)
const products = [
  // 디스코드 봇 제작/설정
  {
    name: "🚀 디스코드 봇 일반",
    price: "₩15,000 ~",
    desc: "기능 맞춤 제작 1개 (기본 봇 제작)",
    tag: "bot",
    badge: "기본 봇 제작",
  },
  {
    name: "🚀 디스코드 봇 고급",
    price: "₩30,000 ~",
    desc: "게임/시스템 등 고급 기능 포함 맞춤 제작",
    tag: "bot",
    badge: "고급 기능",
  },
  {
    name: "☁️ 디스코드 템플릿",
    price: "₩5,000 ~",
    desc: "역할 · 채널 · 카테고리 기본 세팅 템플릿 제공",
    tag: "bot",
    badge: "템플릿",
  },
  {
    name: "🧾 디스코드 백업 클론",
    price: "₩5,000 ~",
    desc: "서버 역할·채널·카테고리 복구 가능한 멀티 서버 백업 클론 봇",
    tag: "bot",
    badge: "백업/클론 봇",
  },
  {
    name: "🎫 티켓봇 제작/세팅",
    price: "₩10,000 ~",
    desc: "RLNL Simple Ticket 봇 설치 및 서버 맞춤 세팅 서비스",
    tag: "bot",
    badge: "티켓봇 세팅",
  },

  // 라이센스 키 상품
  {
    name: "📅 RLNL BOT 30일 라이센스 키",
    price: "₩10,000 ~",
    desc: "30일 동안 사용하는 RLNL BOT 라이센스 키 1개 발급 (영수증 DM 후 키 지급)",
    tag: "bot",
    badge: "30일 라이센스",
  },
  {
    name: "🔑 RLNL BOT 개인 소유 라이센스 키",
    price: "₩30,000 ~",
    desc: "만료 없이 사용하는 RLNL BOT 개인 소유 라이센스 키 1개 발급 (영수증 DM 후 키 지급)",
    tag: "bot",
    badge: "무기한 라이센스",
  },

  // 호스팅
  {
    name: "☁️ 일반 디스코드 봇 호스팅",
    price: "월 ₩5,000 ~",
    desc: "99.9% 디도스 보호 · 자동 백업 (기본 글로벌 호스팅)",
    tag: "hosting",
    badge: "기본 호스팅",
  },
  {
    name: "🤖 고급 디스코드 봇 호스팅",
    price: "월 ₩10,000 ~",
    desc: "5GB SSD · 안정적인 디스코드 봇/웹 호스팅",
    tag: "hosting",
    badge: "프리미엄 호스팅",
  },
  {
    name: "🌟 어드밴스드 봇 호스팅",
    price: "월 ₩20,000 ~",
    desc: "40GB SSD, 디스코드 봇 최대 4개 동시 호스팅",
    tag: "hosting",
    badge: "멀티 봇 호스팅",
  },

  // 디자인
  {
    name: "☁️ 프로필 디자인",
    price: "₩3,000 ~",
    desc: "감성 프로필 아트 1종 제작 (이쁜 선생님이 해주셔요)",
    tag: "design",
    badge: "프로필 디자인",
  },
  {
    name: "☁️ 로고 디자인",
    price: "₩10,000 ~",
    desc: "홈페이지/디스코드/브랜드용 로고 제작",
    tag: "design",
    badge: "로고 디자인",
  },
];

// 상품 렌더
function renderProducts(filter = "all") {
  productList.innerHTML = "";
  products
    .filter(p => filter === "all" || p.tag === filter)
    .forEach((product, index) => {
      const div = document.createElement("div");
      div.className = "product";
      div.innerHTML = `
        <div class="product-content">
          <h3>${product.name}</h3>
          <p>${product.price}</p>
          <small>${product.desc}</small>
          <div class="product-footer">
            <span class="badge">${product.badge}</span>
            <button class="buy-btn" data-index="${index}">구매하기</button>
          </div>
        </div>
      `;
      productList.appendChild(div);
    });
  attachBuyEvents();
}

// 구매하기 버튼: 포인트 변경 없이 문의 텍스트 복사
function attachBuyEvents() {
  const buttons = document.querySelectorAll(".buy-btn");
  buttons.forEach(btn => {
    btn.onclick = async () => {
      const user = auth.currentUser;
      if (!user) {
        alert("로그인 후 이용해 주세요.");
        return;
      }
      const nickname = user.email.split("@")[0];
      const idx = btn.getAttribute("data-index");
      const product = products[idx];

      const msg = `🧾 라니 MALL 구매 / 충전 문의

👤 구매자: ${nickname}
📧 이메일: ${user.email}
포인트 충전 / 결제 문의는 디스코드로 연락해 주세요.

🛒 상품명: ${product.name}
💰 가격: ${product.price}
📄 설명: ${product.desc}`;

      navigator.clipboard.writeText(msg).then(() => {
        alert("구매 / 충전 문의 텍스트가 복사되었습니다. 디스코드에서 붙여넣기 해 주세요.");
        window.open("https://discord.gg/yEym2KZ9BU", "_blank");
      }).catch(() => {
        prompt("아래 내용을 디스코드로 보내주세요:", msg);
        window.open("https://discord.gg/yEym2KZ9BU", "_blank");
      });
    };
  });
}

// 포인트 초기화 (관리자만)
resetBtn.onclick = async () => {
  const user = auth.currentUser;
  if (!user) {
    alert("로그인 후 이용해 주세요.");
    return;
  }
  const uid     = user.uid;
  const userRef = doc(db, "users", uid);
  const snap    = await getDoc(userRef);
  const data    = snap.data();

  if (!data?.isAdmin) {
    alert("관리자만 사용할 수 있는 기능입니다.");
    return;
  }

  const ok = confirm("정말 포인트를 0점으로 초기화할까요?");
  if (!ok) return;

  await updateDoc(userRef, { points: 0 });

  const refreshed = await getDoc(userRef);
  const nickname  = user.email.split("@")[0];
  const points    = refreshed.data().points ?? 0;

  welcomeEl.textContent = `환영합니다, ${nickname}님! (포인트: ${points}점) 👋`;
  alert("포인트가 0점으로 초기화되었습니다.");
};

// 아래 큰 문의하기 버튼
inquiryBtn.onclick = () => {
  const message = `🎯 라니 MALL 문의
💰 가격 및 상품 문의

👤 Discord: soyugwon
🔗 https://discord.gg/yEym2KZ9BU

👇 아래 디스코드 버튼을 눌러 문의를 보내주세요.`;

  navigator.clipboard.writeText(message).then(() => {
    alert("문의 텍스트가 복사되었습니다. 디스코드에서 붙여넣기 해 주세요.");
  }).catch(() => {
    prompt("디스코드로 보내세요:", message);
  });
};

let statusInterval;
function updateStatus() {
  const now = new Date().toLocaleString("ko-KR", {
    hour12:false, timeZone:"Asia/Seoul",
    year:"numeric", month:"2-digit", day:"2-digit",
    hour:"2-digit", minute:"2-digit", second:"2-digit"
  });
  document.getElementById("status").textContent = `🟢 온라인 | ${now}`;
}

// 탭 필터
tabs.forEach(tab => {
  tab.addEventListener("click", () => {
    tabs.forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    const filter = tab.getAttribute("data-filter");
    renderProducts(filter);
  });
});

// 로그인 상태 체크 + 유저 세팅
onAuthStateChanged(auth, async (user) => {
  if (user) {
    const uid      = user.uid;
    const nickname = user.email.split('@')[0];
    const userRef  = doc(db, "users", uid);
    const snap     = await getDoc(userRef);

    if (!snap.exists()) {
      await setDoc(userRef, {
        email: user.email,
        nickname: nickname,
        points: 0,
        isAdmin: false
      });
    }

    const refreshed = await getDoc(userRef);
    const data      = refreshed.data();
    const points    = data.points ?? 0;
    const isAdmin   = data.isAdmin === true;

    welcomeEl.textContent = `환영합니다, ${nickname}님! (포인트: ${points}점) 👋`;

    if (isAdmin) {
      resetBtn.style.display = "inline-flex";
    } else {
      resetBtn.style.display = "none";
    }

    renderProducts();
    statusInterval = setInterval(updateStatus, 1000);
    updateStatus();
  } else {
    window.location.href = "index.html";
  }
});

// 로그아웃
logoutBtn.onclick = async () => {
  logoutBtn.disabled = true;
  logoutBtn.textContent = "로그아웃 중...";
  try { await signOut(auth); }
  catch (error) { console.error("로그아웃 오류:", error); }
};

// 디스코드 버튼
discordBtn.onclick = () => window.open("https://discord.gg/yEym2KZ9BU", "_blank");

// FAQ 버튼
faqBtn?.addEventListener("click", () => {
  window.location.href = "faq.html";
