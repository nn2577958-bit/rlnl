<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>라니 디지털 - 봇 상태</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #e5e7eb;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    /* 네뷸라 별빛 반짝임 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(2px 2px at 20% 20%, #22c55e66, transparent),
        radial-gradient(2px 2px at 80% 30%, #38bdf866, transparent),
        radial-gradient(2px 2px at 40% 80%, #a855f766, transparent);
      opacity: 0.15;
      animation: nebulaTwinkle 6s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes nebulaTwinkle {
      0%   { opacity: 0.05; filter: blur(0px); }
      50%  { opacity: 0.18; filter: blur(1px); }
      100% { opacity: 0.10; filter: blur(0.5px); }
    }

    header {
      border-bottom: 1px solid #111827;
      background: #020617dd;
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 16px;
      position: relative;
      z-index: 1;
    }
    h1 {
      font-size: 26px;
      margin: 0 0 4px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 span.logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55eaa;
    }
    .sub {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 4px;
    }
    .updated {
      font-size: 11px;
      color: #6b7280;
    }
    main { padding: 16px 0 32px 0; }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px 0 10px 0;
      font-size: 12px;
      color: #9ca3af;
    }
    .summary-item {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #1f2937;
      background: #020617dd;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(10px);
    }
    .summary-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .filter-btn {
      border-radius: 999px;
      border: 1px solid #1f2937;
      background: #020617dd;
      color: #9ca3af;
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      backdrop-filter: blur(10px);
      transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
    }
    .filter-btn:hover {
      transform: translateY(-1px);
      border-color: #22c55e55;
    }
    .filter-btn.active {
      background: #111827;
      color: #e5e7eb;
      border-color: #22c55e88;
    }
    .filter-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
    }
    .dot-online { background: #22c55e; }
    .dot-offline { background: #ef4444; }
    .dot-maintenance { background: #f97316; }
    .dot-testing { background: #0ea5e9; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: radial-gradient(circle at top left, #0b1120, #020617 60%);
      border-radius: 14px;
      border: 1px solid #111827;
      padding: 14px 14px 12px 14px;
      position: relative;
      overflow: hidden;
      animation: cardGlow 6s ease-in-out infinite alternate;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: -40%;
      opacity: 0.06;
      background: radial-gradient(circle at top right, #22c55e, transparent 60%);
      pointer-events: none;
    }
    .card-inner {
      position: relative;
      z-index: 1;
    }

    @keyframes cardGlow {
      0% {
        box-shadow: 0 0 0px rgba(34,197,94,0.0);
        border-color: #111827;
      }
      50% {
        box-shadow: 0 0 14px rgba(34,197,94,0.25);
        border-color: #22c55e55;
      }
      100% {
        box-shadow: 0 0 4px rgba(34,197,94,0.1);
        border-color: #1f2937;
      }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .badge span.dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
    }
    .badge-online {
      background: #16a34a22;
      color: #4ade80;
    }
    .badge-online span.dot { background: #22c55e; }
    .badge-offline {
      background: #b91c1c22;
      color: #fca5a5;
    }
    .badge-offline span.dot { background: #ef4444; }
    .badge-maintenance {
      background: #f9731622;
      color: #fed7aa;
    }
    .badge-maintenance span.dot { background: #f97316; }
    .badge-testing {
      background: #0ea5e922;
      color: #7dd3fc;
    }
    .badge-testing span.dot { background: #0ea5e9; }

    .name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .tag {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 8px;
    }
    .desc {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 10px;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #6b7280;
    }
    .pill {
      padding: 2px 8px;
      border-radius: 999px;
      background: #020617;
      border: 1px solid #111827;
    }
    .pill span {
      color: #e5e7eb;
    }

    @media (max-width: 640px) {
      h1 { font-size: 22px; }
      .wrap { padding-inline: 12px; }
      .summary { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1><span class="logo-dot"></span>라니 디지털 봇 상태</h1>
      <div class="sub">RLNL 계열 디스코드 봇의 현재 운영 상태를 한눈에 확인할 수 있습니다.</div>
      <div class="updated" id="updated-text"></div>
    </div>
  </header>

  <main>
    <div class="wrap">
      <div class="summary" id="summary-bar"></div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">전체</button>
        <button class="filter-btn" data-filter="online">
          <span class="filter-dot dot-online"></span> Online
        </button>
        <button class="filter-btn" data-filter="maintenance">
          <span class="filter-dot dot-maintenance"></span> Maintenance
        </button>
        <button class="filter-btn" data-filter="testing">
          <span class="filter-dot dot-testing"></span> Testing
        </button>
        <button class="filter-btn" data-filter="offline">
          <span class="filter-dot dot-offline"></span> Offline
        </button>
      </div>

      <div id="bots-grid" class="grid"></div>
    </div>
  </main>

  <script>
    const STATUS_LABEL = {
      online: "ONLINE",
      offline: "OFFLINE",
      maintenance: "MAINTENANCE",
      testing: "TESTING"
    };

    const STATUS_DESC = {
      online: "정상 운영 중",
      offline: "일시 중단",
      maintenance: "점검/업데이트 중",
      testing: "테스트 환경에서만 운영"
    };

    const CATEGORY_LABEL = {
      game: "게임 / 이벤트",
      utility: "유틸리티",
      security: "보안 / 제보",
      music: "뮤직",
      shop: "상점 / 결제",
      bank: "포인트 / 은행",
      etc: "기타"
    };

    const UPDATED_TEXT = document.getElementById("updated-text");
    UPDATED_TEXT.textContent = "마지막 갱신: " + new Date().toLocaleString("ko-KR");

    function badgeClass(status) {
      switch (status) {
        case "online": return "badge badge-online";
        case "offline": return "badge badge-offline";
        case "maintenance": return "badge badge-maintenance";
        case "testing": return "badge badge-testing";
        default: return "badge";
      }
    }

    let allBots = [];

    function renderSummary() {
      const bar = document.getElementById("summary-bar");
      if (!allBots.length) {
        bar.textContent = "";
        return;
      }
      const total = allBots.length;
      const counts = { online: 0, offline: 0, maintenance: 0, testing: 0 };
      allBots.forEach(b => {
        if (counts[b.status] !== undefined) counts[b.status]++;
      });

      bar.innerHTML = "";
      const totalEl = document.createElement("div");
      totalEl.className = "summary-item";
      totalEl.innerHTML = `총 <strong>${total}</strong> 개 봇`;
      bar.appendChild(totalEl);

      const makeItem = (status, label, cls) => {
        const el = document.createElement("div");
        el.className = "summary-item";
        el.innerHTML = `
          <span class="summary-dot ${cls}"></span>
          ${label}: <strong>${counts[status]}</strong>
        `;
        bar.appendChild(el);
      };

      makeItem("online", "Online", "dot-online");
      makeItem("maintenance", "Maintenance", "dot-maintenance");
      makeItem("testing", "Testing", "dot-testing");
      makeItem("offline", "Offline", "dot-offline");
    }

    function renderBots(filter = "all") {
      const grid = document.getElementById("bots-grid");
      grid.innerHTML = "";

      const list = allBots.filter(bot => {
        if (filter === "all") return true;
        return bot.status === filter;
      });

      list.forEach(bot => {
        const card = document.createElement("div");
        card.className = "card";

        const inner = document.createElement("div");
        inner.className = "card-inner";

        const badge = document.createElement("div");
        badge.className = badgeClass(bot.status);
        badge.innerHTML = `<span class="dot"></span>${STATUS_LABEL[bot.status] || bot.status.toUpperCase()}`;

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = bot.name;

        const tag = document.createElement("div");
        tag.className = "tag";
        const catKey = bot.category || "etc";
        const cat = CATEGORY_LABEL[catKey] || CATEGORY_LABEL["etc"];
        tag.textContent = cat;

        const desc = document.createElement("div");
        desc.className = "desc";
        desc.textContent = bot.desc || STATUS_DESC[bot.status] || "";

        const meta = document.createElement("div");
        meta.className = "meta";
        const statusNote = bot.note || STATUS_DESC[bot.status] || "";
        meta.innerHTML = `
          <div class="pill">ID: <span>${bot.id}</span></div>
          <div>${statusNote}</div>
        `;

        inner.appendChild(badge);
        inner.appendChild(name);
        inner.appendChild(tag);
        inner.appendChild(desc);
        inner.appendChild(meta);
        card.appendChild(inner);
        grid.appendChild(card);
      });
    }

    fetch("bots.json")
      .then(res => res.json())
      .then(data => {
        allBots = data;
        renderSummary();
        renderBots("all");
      })
      .catch(err => {
        console.error(err);
        document.getElementById("bots-grid").innerHTML =
          "<div style='color:#f87171;font-size:13px;'>bots.json 을 불러오지 못했습니다. 파일 위치를 확인하세요.</div>";
      });

    document.addEventListener("click", (e) => {
      const btn = e.target.closest(".filter-btn");
      if (!btn) return;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const filter = btn.dataset.filter || "all";
      renderBots(filter);
    });
  </script>
</body>
</html>
