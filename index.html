<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>라니MALL · 디스코드 봇·서버세팅·로고 디자인</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<meta name="description"
      content="디스코드 봇 제작, 서버 세팅, 로고 디자인까지 한 번에 맡길 수 있는 라니MALL. 실제 운영 중인 RLNL 게임/공지/출석 봇과 서버 세팅 예시를 보고, Google 계정으로 바로 이용해 보세요.">

<link rel="icon" type="image/png"
      href="https://cdn.discordapp.com/attachments/1083742969473024050/1479363671908942094/apple-touch-icon.png?ex=69af1008&is=69adbe88&hm=59f88e009f2f2f723589db4546ab77703221b410f76767ace0a5ef2c3e355b8a">

<style>
* { box-sizing:border-box; margin:0; padding:0 }

/* ==== 배경 ==== */
body {
  min-height:100vh;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at top left, rgba(59,130,246,0.16), transparent 55%),
    radial-gradient(circle at bottom right, rgba(236,72,153,0.13), transparent 55%),
    #020617;
  background-size:180% 180%;
  animation:bgWave 32s ease-in-out infinite;
  color:#e5e7eb;
  padding:20px;
}
@keyframes bgWave {
  0%   { background-position:0% 50%; }
  50%  { background-position:100% 50%; }
  100% { background-position:0% 50%; }
}

.wrap {
  max-width:980px;
  margin:0 auto;
}

/* 상단 헤더 */
.site-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:22px;
}
.site-brand {
  display:flex;
  align-items:center;
  gap:10px;
}
.site-logo {
  width:32px;
  height:32px;
  border-radius:10px;
  overflow:hidden;
  border:1px solid rgba(148,163,184,0.7);
  background:#020617;
}
.site-logo img {
  width:100%; height:100%; object-fit:cover;
}
.site-title {
  display:flex;
  flex-direction:column;
}
.site-title-main {
  font-size:15px;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
}
.site-title-sub {
  font-size:11px;
  color:#9ca3af;
}

/* 상단 네비 */
.site-nav {
  display:flex;
  gap:14px;
  font-size:12px;
  color:#9ca3af;
}
.site-nav a {
  color:#d1d5db;
  text-decoration:none;
  padding:4px 8px;
  border-radius:999px;
  font-weight:400;
}
.site-nav a:hover {
  color:#e5e7eb;
  background:rgba(15,23,42,0.9);
}

/* 라니봇 v1 메인 허브 강조 */
.nav-main-bot {
  background:linear-gradient(135deg,#1e40af,#16a34a);
  color:#f9fafb;
  font-weight:500;
  box-shadow:0 0 0 1px rgba(15,23,42,0.9), 0 6px 12px rgba(37,99,235,0.7);
}
.nav-main-bot:hover {
  filter:brightness(1.05);
}

/* Hero 영역 */
.hero {
  display:grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.1fr);
  gap:24px;
  margin-bottom:28px;
}
@media (max-width:800px){
  .hero {
    grid-template-columns:1fr;
  }
}

/* 왼쪽 메인 카드 - 버튼을 카드 맨 아래로 */
.hero-main {
  display:flex;
  flex-direction:column;
  position:relative;
  padding:18px 18px 20px;
  border-radius:18px;
  background:rgba(15,23,42,0.96);
  border:1px solid rgba(55,65,81,0.95);
  box-shadow:
    0 22px 60px rgba(15,23,42,0.95),
    0 0 0 1px rgba(15,23,42,1);
  min-height:320px;
}

.hero-kicker {
  font-size:11px;
  color:#9ca3af;
  margin-bottom:6px;
}
.hero-title {
  font-size:24px;
  font-weight:800;
  line-height:1.35;
  margin-bottom:8px;
}
.hero-title span {
  background:linear-gradient(135deg,#38bdf8,#22c55e,#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.hero-sub {
  font-size:13px;
  color:#cbd5f5;
  margin-bottom:14px;
}

.hero-points {
  font-size:13px;
  color:#e5e7eb;
  margin-bottom:16px;
  list-style-type:none;
  padding-left:0;
}
.hero-points li { margin-bottom:4px; }

.hero-price {
  font-size:12px;
  color:#9ca3af;
  margin-bottom:14px;
}

/* 견적문의 / 구글 로그인 버튼: 카드 안 맨 아래 */
.hero-actions {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
  margin-top:auto;
  padding-top:10px;
  border-top:1px solid rgba(30,41,59,0.7);
}

.btn-main,
.google-btn-top {
  padding:9px 18px;
  border-radius:999px;
  border:none;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:linear-gradient(135deg,#2563eb,#22c55e);
  color:#f9fafb;
  text-decoration:none;
  box-shadow:0 4px 10px rgba(15,23,42,0.6);
}

.btn-main:hover,
.google-btn-top:hover {
  transform:translateY(-1px);
  box-shadow:0 6px 16px rgba(15,23,42,0.8);
}

/* Google 아이콘만 유지 */
.google-icon-top {
  width:18px;
  height:18px;
  border-radius:4px;
  flex-shrink:0;
}

/* 오른쪽 예시 */
.hero-examples {
  display:flex;
  flex-direction:column;
  gap:10px;
}
.hero-card {
  padding:12px 13px;
  border-radius:16px;
  background:rgba(15,23,42,0.96);
  border:1px solid rgba(55,65,81,0.95);
  font-size:12px;
}
.hero-card-title {
  font-size:13px;
  font-weight:600;
  margin-bottom:4px;
}
.hero-tag-row {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.hero-tag {
  font-size:11px;
  padding:2px 8px;
  border-radius:999px;
  background:#020617;
  border:1px solid rgba(55,65,81,0.9);
  color:#9ca3af;
}

/* 카드 안 이미지 */
.hero-image {
  margin-top:8px;
  border-radius:10px;
  overflow:hidden;
  border:1px solid rgba(55,65,81,0.9);
}
.hero-image img {
  display:block;
  width:100%;
  height:auto;
}

/* 서비스 카드 */
.section-title {
  font-size:18px;
  font-weight:700;
  margin:10px 0 8px;
}
.section-sub {
  font-size:12px;
  color:#9ca3af;
  margin-bottom:14px;
}

.service-grid {
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:14px;
}
@media (max-width:900px){
  .service-grid { grid-template-columns:1fr; }
}

.service-card {
  padding:14px 14px 16px;
  border-radius:16px;
  background:rgba(15,23,42,0.98);
  border:1px solid rgba(55,65,81,0.95);
  box-shadow:0 16px 40px rgba(15,23,42,0.9);
  font-size:12px;
}
.service-card-title {
  font-size:15px;
  font-weight:600;
  margin-bottom:4px;
}
.service-card-price {
  font-size:12px;
  color:#a5b4fc;
  margin-bottom:6px;
}
.service-card ul { padding-left:16px; }
.service-card li { margin-bottom:3px; }

/* 프로세스 */
.process-grid {
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
}
@media (max-width:800px){
  .process-grid { grid-template-columns:1fr; }
}
.process-item {
  padding:10px 12px;
  border-radius:12px;
  background:rgba(15,23,42,0.95);
  border:1px dashed rgba(55,65,81,0.8);
  font-size:12px;
}
.process-step {
  font-size:11px;
  color:#9ca3af;
}

/* 로딩 인디케이터 */
.loading {
  display:inline-block;
  width:16px;height:16px;
  border:2px solid rgba(255,255,255,0.3);
  border-radius:50%;
  border-top-color:#fff;
  margin-right:8px;
  animation:spin 1s ease-in-out infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

.error {
  margin-top:8px;
  font-size:12px;
  color:#fee2e2;
  min-height:16px;
}

/* 푸터 */
.footer {
  margin-top:18px;
  padding-top:10px;
  border-top:1px solid rgba(31,41,55,0.9);
  font-size:11px;
  color:#6b7280;
  display:flex;
  justify-content:space-between;
  gap:8px;
  flex-wrap:wrap;
}
.footer a {
  color:#9ca3af;
  text-decoration:none;
}
.footer a:hover { text-decoration:underline; }

/* 모바일 */
@media (max-width:640px){
  body { padding:16px; }
}

/* ==== 진입 모달 (한 다리) ==== */
.entry-overlay {
  position: fixed;
  inset: 0;
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(circle at 10% 20%, rgba(96,165,250,0.35), transparent 55%),
    radial-gradient(circle at 80% 80%, rgba(244,114,182,0.35), transparent 55%),
    rgba(15,23,42,0.92);
  backdrop-filter: blur(18px);
}
.entry-panel {
  width: 100%;
  max-width: 420px;
  border-radius: 22px;
  padding: 18px 18px 16px;
  background: radial-gradient(circle at top left, rgba(56,189,248,0.18), transparent 55%),
              radial-gradient(circle at bottom right, rgba(147,51,234,0.18), transparent 55%),
              rgba(15,23,42,0.98);
  border: 1px solid rgba(148,163,184,0.8);
  box-shadow:
    0 0 0 1px rgba(15,23,42,1),
    0 20px 50px rgba(15,23,42,1),
    0 0 40px rgba(37,99,235,0.6);
}
.entry-header {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}
.entry-dot {
  width:9px;
  height:9px;
  border-radius:999px;
  background:linear-gradient(135deg,#38bdf8,#22c55e,#a855f7);
  box-shadow:0 0 14px rgba(56,189,248,0.9);
}
.entry-title {
  font-size:1rem;
  font-weight:600;
  letter-spacing:.06em;
}
.entry-sub {
  font-size:.82rem;
  color:#9ca3af;
  margin-bottom:10px;
}
.entry-note {
  font-size:.78rem;
  padding:6px 9px;
  border-radius:12px;
  background:rgba(15,23,42,0.98);
  border:1px solid rgba(148,163,184,0.7);
  margin-bottom:10px;
}
.entry-actions {
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:4px;
}
.entry-btn {
  width:100%;
  border-radius:999px;
  border:none;
  padding:8px 10px;
  font-size:.86rem;
  font-weight:600;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.entry-btn-main {
  background:linear-gradient(135deg,#2563eb,#22c55e);
  color:#f9fafb;
  box-shadow:0 4px 12px rgba(15,23,42,0.9);
}
.entry-btn-main:hover {
  transform:translateY(-1px);
  box-shadow:0 6px 16px rgba(15,23,42,1);
}
.entry-btn-sub {
  background:rgba(15,23,42,0.98);
  color:#e5e7eb;
  border:1px solid rgba(148,163,184,0.8);
}
.entry-btn-sub:hover {
  background:rgba(15,23,42,1);
}
.entry-helper {
  font-size:.76rem;
  color:#9ca3af;
  margin-top:10px;
}
.entry-helper a {
  color:#c4b5fd;
  text-decoration:underline;
}
</style>
</head>
<body>
<div class="wrap">
  <!-- 여기 안에는 네가 원래 쓰던 메인 컨텐츠 그대로 (상품 카드 등) 넣으면 됨 -->
</div>

<!-- 진입 모달 -->
<div class="entry-overlay" id="entry-overlay">
  <div class="entry-panel">
    <div class="entry-header">
      <span class="entry-dot"></span>
      <div class="entry-title">라니MALL 진입</div>
    </div>
    <p class="entry-sub">
      RLNL · 라니 관련 결제·세팅을 관리하는 페이지입니다.<br>
      아래에서 이용 방식을 선택해 주세요.
    </p>
    <div class="entry-note">
      · Google 로그인 계정 기준으로 봇/서버 세팅 내역이 관리됩니다.<br>
      · 지인 / 테스트 계정은 일반 회원가입(이메일/비밀번호)으로도 이용 가능합니다.
    </div>
    <div class="entry-actions">
      <button type="button" class="entry-btn entry-btn-main" id="entry-google">
        🔥 Google 계정으로 계속
      </button>
      <button type="button" class="entry-btn entry-btn-sub" id="entry-normal">
        일반 회원가입 / 로그인으로 계속
      </button>
    </div>
    <p class="entry-helper">
      이 안내는 라니MALL 진입 시에만 한 번 표시됩니다.<br>
      실제 상품·세팅 내용은 아래 메인 화면에서 그대로 확인할 수 있습니다.
    </p>
  </div>
</div>

<!-- Firebase 로그인 스크립트 -->
<script type="module">
import { auth } from "./firebase.js";
import {
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const provider    = new GoogleAuthProvider();
const loginBtnTop = document.getElementById("google-login-btn-top");
const errorBox    = document.getElementById("error-box");
const btnTextTop  = document.getElementById("btn-text-top");

// 원래 구조: 로그인 성공하면 바로 HOME 이동
async function handleGoogleLogin() {
  loginBtnTop.disabled = true;
  errorBox.textContent = "";
  btnTextTop.innerHTML = '<span class="loading"></span>로그인 중...';

  try {
    const result = await signInWithPopup(auth, provider);
    if (result.user) window.location.href = "home.html";
  } catch (err) {
    console.error("로그인 오류:", err);
    errorBox.textContent =
      "로그인 실패: " + (err && err.message ? err.message : "다시 시도해 주세요.");
    loginBtnTop.disabled = false;
    btnTextTop.textContent = "Google로 계속";
  }
}

loginBtnTop.addEventListener("click", handleGoogleLogin);

// 진입 모달: Google => 같은 로그인 함수 재사용, 일반 => login.html
const entryOverlay = document.getElementById("entry-overlay");
const entryGoogle  = document.getElementById("entry-google");
const entryNormal  = document.getElementById("entry-normal");

entryGoogle.addEventListener("click", async () => {
  await handleGoogleLogin();
});

entryNormal.addEventListener("click", () => {
  window.location.href = "login.html";
});

// 원래처럼: 이미 로그인된 상태로 index 접근시 바로 home.html 로 튕기고 싶으면 이것도 다시 살려
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "home.html";
  }
});
</script>
</body>
</html>
